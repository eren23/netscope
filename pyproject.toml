[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "netscope"
version = "0.1.3"
description = "An oscilloscope for your neural net — import and auto-trace any PyTorch/transformers pipeline into an interactive architecture graph with live tensor shapes, zero decorators."
requires-python = ">=3.9"
dependencies = [
    "wrapt>=1.14",
    "networkx>=3.0",
]
readme = "README.md"
keywords = ["pytorch", "transformers", "visualization", "tracing", "neural-network", "graph", "debugging", "machine-learning", "deep-learning", "shapes"]
classifiers = ["Development Status :: 4 - Beta", "Intended Audience :: Developers", "Intended Audience :: Science/Research", "Programming Language :: Python :: 3", "Programming Language :: Python :: 3.9", "Programming Language :: Python :: 3.10", "Programming Language :: Python :: 3.11", "Programming Language :: Python :: 3.12", "Topic :: Scientific/Engineering :: Artificial Intelligence", "Topic :: Scientific/Engineering :: Visualization", "Topic :: Software Development :: Debuggers"]
license = "MIT"

[project.optional-dependencies]
flops = ["thop>=0.1.1"]
otel = ["opentelemetry-api>=1.20"]
dev = ["pytest>=7"]

[[project.authors]]
name = "Eren Akbulut"
email = "erenakbulutwork@gmail.com"

[project.urls]
Homepage = "https://github.com/eren23/netscope"
Repository = "https://github.com/eren23/netscope"
Issues = "https://github.com/eren23/netscope/issues"
[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["netscope*"]


[tool.setuptools.package-data]
netscope = ["web/*.html", "web/**/*.html", "web/*.js", "web/**/*.js"]
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
